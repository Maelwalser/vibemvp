name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint (staticcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

  security:
    name: Security (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          # Excluded rules are known false positives for a developer CLI tool:
          # G101 — enum string values that look like credential names (e.g. "APIKey", "BearerToken")
          # G204 — subprocess with variable args (intentional: runs go build/vet/gofmt)
          # G301 — directory permissions > 0750 (generated code dirs must be world-readable for go build)
          # G302 — file permissions > 0600 (generated source files must be readable by compiler/teammates)
          # G304 — file read via variable path (intentional: reads from user-configured output dir)
          # G306 — WriteFile permissions > 0600 (generated source files use standard 0644)
          # G703 — path traversal taint (intentional: writes generated files to output dir)
          # G122 — filepath.Walk TOCTOU (standard Go pattern, low risk in local CLI context)
          # G404 — math/rand (used for UI animations only, not security-sensitive)
          gosec -exclude-generated -exclude=G101,G204,G301,G302,G304,G306,G703,G122,G404 ./...
