name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64  }
          - { goos: linux,   goarch: arm64  }
          - { goos: darwin,  goarch: amd64  }
          - { goos: darwin,  goarch: arm64  }
          - { goos: windows, goarch: amd64  }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"

          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/vibemenu${EXT} ./cmd/agent

          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/realize${EXT} ./cmd/realize

      - name: Package
        run: |
          cd dist
          TAG="${{ github.ref_name }}"
          NAME="vibemenu-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" vibemenu.exe realize.exe
          else
            tar czf "${NAME}.tar.gz" vibemenu realize
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.{tar.gz,zip}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
